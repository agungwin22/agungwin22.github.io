<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="display: block; margin: 0 auto 2rem;">
  <defs>
    <!-- Neon gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central node -->
  <circle cx="100" cy="100" r="12" fill="url(#neonGradient)" filter="url(#glow)" />

  <!-- Connection lines -->
  <line x1="100" y1="100" x2="40" y2="40" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" />
  <line x1="100" y1="100" x2="160" y2="40" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" />
  <line x1="100" y1="100" x2="40" y2="160" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" />
  <line x1="100" y1="100" x2="160" y2="160" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" />

  <!-- Outer nodes -->
  <circle cx="40" cy="40" r="6" fill="none" stroke="url(#neonGradient)" stroke-width="2" />
  <circle cx="160" cy="40" r="6" fill="none" stroke="url(#neonGradient)" stroke-width="2" />
  <circle cx="40" cy="160" r="6" fill="none" stroke="url(#neonGradient)" stroke-width="2" />
  <circle cx="160" cy="160" r="6" fill="none" stroke="url(#neonGradient)" stroke-width="2" />

  <!-- Circuit-style path (decorative) -->
  <path d="M30,100 Q50,90 60,100 T80,100 T100,110 T120,100 T140,90 T170,100" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="1.5" 
        stroke-dasharray="5,5"
        opacity="0.7" />

  <!-- Small data points -->
  <circle cx="70" cy="70" r="2" fill="#00f0ff" opacity="0.8" />
  <circle cx="130" cy="70" r="2" fill="#00ff88" opacity="0.8" />
  <circle cx="70" cy="130" r="2" fill="#9d4edd" opacity="0.8" />
  <circle cx="130" cy="130" r="2" fill="#00f0ff" opacity="0.8" />
</svg>
